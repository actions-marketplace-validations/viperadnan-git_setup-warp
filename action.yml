name: Setup WARP
description: Set up Cloudflare WARP on GitHub Actions runners with Docker support, automatic retries, and connectivity verification.
author: Adnan Ahmad <viperadnan@gmail.com>

branding:
  icon: shield
  color: orange

inputs:
  mode:
    description: WARP mode (client or wireguard)
    required: false
    default: client
  stack:
    description: IP stack (ipv4, ipv6, or dual)
    required: false
    default: dual
  retries:
    description: Number of setup retry attempts
    required: false
    default: "3"
  configure_docker:
    description: Configure Docker containers to route through WARP
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up WARP
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_STACK: ${{ inputs.stack }}
        INPUT_RETRIES: ${{ inputs.retries }}
        INPUT_CONFIGURE_DOCKER: ${{ inputs.configure_docker }}
      shell: bash
      run: |
        set -euo pipefail

        # ── Validate inputs ──────────────────────────────────────────────
        [[ "$INPUT_MODE" =~ ^(client|wireguard)$ ]]  || { echo "::error::Invalid mode '$INPUT_MODE'."; exit 1; }
        [[ "$INPUT_STACK" =~ ^(ipv4|ipv6|dual)$ ]]   || { echo "::error::Invalid stack '$INPUT_STACK'."; exit 1; }
        [[ "$INPUT_RETRIES" =~ ^[0-9]+$ ]]            || { echo "::error::Invalid retries '$INPUT_RETRIES'."; exit 1; }

        # ── Logging helpers ──────────────────────────────────────────────
        log()  { echo "● $*"; }
        warn() { echo "::warning::$*"; }
        err()  { echo "::error::$*"; }

        # ── Package installation ─────────────────────────────────────────
        install_client() {
          sudo apt-get -y update
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          local arch
          arch=$(dpkg --print-architecture)
          echo "deb [arch=$arch signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
        }

        install_wireguard() {
          sudo apt-get -y update
          local resolver=openresolv
          if [[ "$(lsb_release -is 2>/dev/null)" == "Ubuntu" ]] \
             && (( $(lsb_release -rs 2>/dev/null | tr -d . || echo 0) >= 2404 )); then
            resolver=resolvconf
          fi
          sudo apt-get -y install --no-install-recommends \
            net-tools iproute2 "$resolver" dnsutils iptables wireguard-tools
        }

        # ── Verification ─────────────────────────────────────────────────
        verify_connectivity() {
          log "Verifying connectivity..."
          local i
          for i in $(seq 1 10); do
            if curl -sf -m 10 -o /dev/null https://cloudflare.com/cdn-cgi/trace 2>/dev/null; then
              log "Connectivity OK (attempt $i)."
              nslookup google.com >/dev/null 2>&1 && log "DNS OK." || warn "DNS nslookup failed."
              return 0
            fi
            echo "  waiting... ($i/10)"
            sleep 3
          done
          err "Connectivity check failed after 30s."
          return 1
        }

        verify_warp() {
          log "Checking WARP tunnel..."
          local trace
          trace=$(curl -sm10 --retry 2 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || true)
          if echo "$trace" | grep -q "warp=on\|warp=plus"; then
            echo "$trace" | grep -E "^(ip|warp|loc)="
            return 0
          fi
          warn "WARP not active: $(echo "$trace" | grep -E '^warp=' || echo 'no trace')"
          return 1
        }

        # ── Docker configuration ─────────────────────────────────────────
        configure_docker() {
          [[ "$INPUT_CONFIGURE_DOCKER" == 'true' ]] || return 0
          log "Configuring Docker for WARP..."

          # Update daemon DNS
          local cfg="{}"
          [[ -f /etc/docker/daemon.json ]] && cfg=$(cat /etc/docker/daemon.json)
          sudo mkdir -p /etc/docker
          echo "$cfg" | python3 -c "
        import json,sys; c=json.load(sys.stdin)
        c['dns']=['1.1.1.1','8.8.8.8','8.8.4.4']
        json.dump(c,sys.stdout,indent=2)" | sudo tee /etc/docker/daemon.json >/dev/null

          sudo systemctl restart docker.service
          local i
          for i in $(seq 1 15); do
            if docker info >/dev/null 2>&1; then
              log "Docker daemon restarted with WARP DNS."
              break
            fi
            sleep 1
          done

          # Wrapper to inject --network host into docker run
          local docker_bin
          docker_bin=$(which docker)
          [[ -f "${docker_bin}.real" ]] && { log "Docker wrapper already installed."; return 0; }
          sudo mv "$docker_bin" "${docker_bin}.real"
          printf '#!/bin/bash\nREAL="$(dirname "$0")/docker.real"\n[[ "$1" == "run" ]] && { shift; exec "$REAL" run --network host "$@"; }\nexec "$REAL" "$@"\n' \
            | sudo tee "$docker_bin" >/dev/null
          sudo chmod +x "$docker_bin"
          log "Docker wrapper installed (--network host)."
        }

        # ── Mode-specific setup ──────────────────────────────────────────
        setup_wireguard() {
          log "Setting up WARP (WireGuard)..."
          install_wireguard
          command -v wg >/dev/null && command -v wg-quick >/dev/null \
            || { err "wg/wg-quick not found."; return 1; }

          local lan gw
          lan=$(ip route get 192.168.193.10 2>/dev/null | grep -oP 'src \K\S+' || true)
          [[ -z "$lan" ]] && lan=$(ip route get 1.1.1.1 2>/dev/null | grep -oP 'src \K\S+' || true)
          [[ -z "$lan" ]] && { err "Cannot detect LAN IP."; return 1; }
          gw=$(ip route show default | grep -oP 'via \K\S+' || true)
          log "LAN: $lan, GW: ${gw:-none}"

          {
            echo "[Interface]"
            echo "PrivateKey = cKE7LmCF61IhqqABGhvJ44jWXp8fKymcMAEVAzbDF2k="
            echo "Address = 172.16.0.2/32"
            echo "Address = fd01:5ca1:ab1e:823e:e094:eb1c:ff87:1fab/128"
            echo "DNS = 1.1.1.1,8.8.8.8,8.8.4.4,2606:4700:4700::1111,2001:4860:4860::8888,2001:4860:4860::8844"
            echo "MTU = 1280"
            echo "PostUp = ip -4 rule add to 169.254.169.254/32 lookup main prio 10"
            echo "PostDown = ip -4 rule delete to 169.254.169.254/32 lookup main prio 10"
            if [[ -n "$gw" ]]; then
              local gw_net="${gw%.*}.0/24"
              echo "PostUp = ip -4 rule add to $gw_net lookup main prio 11"
              echo "PostDown = ip -4 rule delete to $gw_net lookup main prio 11"
            fi
            echo ""
            echo "[Peer]"
            echo "PublicKey = bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo="
            echo "Endpoint = engage.cloudflareclient.com:2408"
            case "$INPUT_STACK" in
              ipv4) echo "AllowedIPs = 0.0.0.0/0" ;;
              ipv6) echo "AllowedIPs = ::/0" ;;
              *)    echo "AllowedIPs = 0.0.0.0/0"; echo "AllowedIPs = ::/0" ;;
            esac
          } | sudo tee /etc/wireguard/warp.conf >/dev/null

          sudo wg-quick up warp
          sleep 3
          ip link show warp >/dev/null 2>&1 || { err "WireGuard interface not found."; return 1; }
          log "WireGuard interface up."
          sudo wg show warp 2>/dev/null || true
        }

        setup_client() {
          log "Setting up WARP (client)..."
          install_client

          sudo systemctl enable --now warp-svc 2>/dev/null || true
          log "Waiting for WARP daemon..."
          local i
          for i in $(seq 1 10); do
            sudo warp-cli --accept-tos registration show 2>&1 | grep -qi "account\|registration\|not registered" && break
            [[ -S /run/warp-svc.sock || -S /var/run/cloudflare-warp/warp.sock ]] && break
            sleep 2
          done

          sudo warp-cli --accept-tos registration delete 2>/dev/null || true
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp+doh

          case "$INPUT_STACK" in
            ipv4) sudo warp-cli --accept-tos tunnel ip add-range ::0/0 ;;
            ipv6) sudo warp-cli --accept-tos tunnel ip add-range 0.0.0.0/0 ;;
          esac

          sudo warp-cli --accept-tos connect
          sleep 5
          log "Status: $(sudo warp-cli --accept-tos status 2>&1 || echo unknown)"
        }

        teardown() {
          case "$INPUT_MODE" in
            wireguard) sudo wg-quick down warp 2>/dev/null || true ;;
            client)    sudo warp-cli disconnect 2>/dev/null || true
                       sudo warp-cli registration delete 2>/dev/null || true ;;
          esac
        }

        dump_debug() {
          echo ""; echo "=== Debug ==="
          echo "--- interfaces ---";     ip addr show 2>/dev/null || true
          echo "--- routes ---";         ip route show 2>/dev/null || true
          echo "--- ip rules ---";       ip rule show 2>/dev/null || true
          echo "--- resolv.conf ---";    cat /etc/resolv.conf 2>/dev/null || true
          echo "--- iptables nat ---";   sudo iptables -t nat -L -n 2>/dev/null || true
          case "$INPUT_MODE" in
            wireguard) echo "--- wg ---";   sudo wg show 2>/dev/null || true ;;
            client)    echo "--- warp ---"; sudo warp-cli --accept-tos status 2>&1 || true ;;
          esac
          [[ "$INPUT_CONFIGURE_DOCKER" == 'true' ]] && {
            echo "--- docker dns ---"; cat /etc/docker/daemon.json 2>/dev/null || true
          }
        }

        # ── Main loop ────────────────────────────────────────────────────
        for attempt in $(seq 1 "$INPUT_RETRIES"); do
          echo ""; echo "═══ WARP setup attempt $attempt/$INPUT_RETRIES ($INPUT_MODE, $INPUT_STACK) ═══"

          (( attempt > 1 )) && { teardown; sleep $((attempt * 5)); }

          rc=0; setup_"$INPUT_MODE" || rc=$?
          (( rc != 0 ))            && { warn "Setup failed (attempt $attempt)."; continue; }
          verify_connectivity      || { warn "Connectivity failed (attempt $attempt)."; continue; }
          verify_warp              || { warn "WARP not active (attempt $attempt)."; continue; }

          configure_docker

          echo ""
          log "WARP tunnel established."
          echo "IPv4: $(curl -sm5 --retry 1 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -oP 'ip=\K.*' || echo N/A)"
          echo "IPv6: $(curl -6 -sm5 --retry 1 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -oP 'ip=\K.*' || echo N/A)"
          exit 0
        done

        err "Failed to establish WARP after $INPUT_RETRIES attempts."
        dump_debug
        exit 1
